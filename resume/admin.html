<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理者画面 | 履歴書</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #f3f4f6;
            min-height: 100vh;
            color: #333;
            padding: 40px 20px;
        }

        .card {
            background: white;
            border-radius: 14px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 680px;
            margin: 0 auto;
        }

        .card + .card { margin-top: 24px; }

        .card-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 6px;
            color: #555;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 14px;
            font-family: 'Noto Sans JP', sans-serif;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: #1976d2; }

        .form-group { margin-bottom: 16px; }

        .btn {
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Noto Sans JP', sans-serif;
            transition: background 0.2s;
        }

        .btn-primary { background: #1976d2; color: white; }
        .btn-primary:hover { background: #1565c0; }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

        .btn-danger { background: #e53935; color: white; }
        .btn-danger:hover { background: #c62828; }

        .btn-gray { background: #eeeeee; color: #333; }
        .btn-gray:hover { background: #e0e0e0; }

        .msg {
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            margin-top: 12px;
            display: none;
            text-align: center;
        }

        .msg.show { display: block; }
        .msg.success { background: #e8f5e9; color: #2e7d32; }
        .msg.error   { background: #ffebee; color: #c62828; }

        /* ユーザーテーブル */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            margin-top: 8px;
        }

        th {
            background: #f5f5f5;
            padding: 10px 12px;
            text-align: left;
            font-weight: bold;
            border-bottom: 2px solid #e0e0e0;
        }

        td {
            padding: 10px 12px;
            border-bottom: 1px solid #f0f0f0;
        }

        tr:hover td { background: #fafafa; }

        .badge-active {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        /* セクション表示切替 */
        #loginSection  { display: block; }
        #adminSection  { display: none; }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .admin-badge {
            background: #1976d2;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        /* PDF一覧 */
        .card.wide { max-width: 860px; }

        .pdf-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            margin-bottom: 8px;
            background: #fafafa;
            transition: background 0.15s;
        }
        .pdf-item:hover { background: #f0f4ff; border-color: #90caf9; }

        .pdf-icon { font-size: 20px; flex-shrink: 0; }

        .pdf-info { flex: 1; min-width: 0; }

        .pdf-name {
            font-weight: bold;
            font-size: 14px;
            color: #1976d2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-decoration: none;
        }
        .pdf-name:hover { text-decoration: underline; }

        .pdf-date { font-size: 12px; color: #888; margin-top: 2px; }

        .pdf-actions { display: flex; gap: 6px; flex-shrink: 0; }

        .btn-open {
            background: #1976d2;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Noto Sans JP', sans-serif;
            transition: background 0.2s;
        }
        .btn-open:hover { background: #1565c0; }

        .btn-download {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1.5px solid #a5d6a7;
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Noto Sans JP', sans-serif;
            transition: background 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .btn-download:hover { background: #c8e6c9; }

        .user-badge {
            display: inline-block;
            background: #fff3e0;
            color: #e65100;
            border: 1px solid #ffcc80;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            padding: 1px 8px;
            margin-left: 6px;
            vertical-align: middle;
        }

        #pdfCount {
            font-size: 13px;
            color: #888;
            margin-left: 4px;
            font-weight: normal;
        }

        .sort-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            font-size: 13px;
            color: #666;
        }

        .sort-btn {
            border: 1.5px solid #ddd;
            background: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            font-family: 'Noto Sans JP', sans-serif;
            transition: all 0.15s;
            color: #555;
        }
        .sort-btn:hover { border-color: #1976d2; color: #1976d2; }
        .sort-btn.active { background: #1976d2; color: white; border-color: #1976d2; }

        #pdfList { margin-top: 4px; }
    </style>
</head>
<body>

    <!-- ① 管理者ログインセクション -->
    <div id="loginSection">
        <div class="card" style="max-width:400px;">
            <div class="card-title">🔐 管理者ログイン</div>

            <div class="form-group">
                <label>管理者ID</label>
                <input type="text" id="adminId" placeholder="管理者IDを入力" autocomplete="username">
            </div>
            <div class="form-group">
                <label>パスワード</label>
                <input type="password" id="adminPass" placeholder="パスワードを入力" autocomplete="current-password">
            </div>

            <button class="btn btn-primary" id="adminLoginBtn" onclick="handleAdminLogin()" style="width:100%; padding:13px;">
                ログイン
            </button>

            <div class="msg" id="loginMsg"></div>

            <div style="text-align:center; margin-top:20px; font-size:12px; color:#aaa;">
                <a href="/login.html" style="color:#1976d2; text-decoration:underline;">ユーザーログインはこちら</a>
            </div>
        </div>
    </div>

    <!-- ② 管理セクション（ログイン後に表示） -->
    <div id="adminSection">

        <!-- ヘッダー -->
        <div class="card">
            <div class="header-bar">
                <div style="font-size:18px; font-weight:bold;">📋 履歴書システム 管理者画面</div>
                <div style="display:flex; align-items:center; gap:12px;">
                    <span class="admin-badge">👤 管理者</span>
                    <button class="btn btn-gray" onclick="adminLogout()">ログアウト</button>
                </div>
            </div>
        </div>

        <!-- ユーザー追加 -->
        <div class="card">
            <div class="card-title">➕ ユーザーを追加</div>
            <div style="display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap;">
                <div class="form-group" style="flex:1; min-width:140px; margin:0;">
                    <label>ユーザーID</label>
                    <input type="text" id="newUserId" placeholder="例: user01">
                </div>
                <div class="form-group" style="flex:1; min-width:140px; margin:0;">
                    <label>パスワード</label>
                    <input type="text" id="newUserPass" placeholder="例: Pass1234">
                </div>
                <button class="btn btn-primary" onclick="createUser()" style="height:42px;">追加する</button>
                <button class="btn btn-gray" onclick="generatePassword()" style="height:42px;" title="パスワードを自動生成">🎲 自動生成</button>
            </div>
            <div class="msg" id="createMsg"></div>
        </div>

        <!-- ユーザー一覧 -->
        <div class="card">
            <div class="card-title">
                👥 ユーザー一覧
                <button class="btn btn-gray" onclick="loadUsers()" style="font-size:12px; padding:4px 12px; margin-left:auto;">🔄 更新</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ユーザーID</th>
                        <th>登録日時</th>
                        <th>状態</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                    <tr><td colspan="4" style="text-align:center; color:#aaa; padding:20px;">読み込み中...</td></tr>
                </tbody>
            </table>
            <div class="msg" id="deleteMsg"></div>
        </div>

        <!-- 保存済みPDF一覧 -->
        <div class="card wide">
            <div class="card-title">
                📁 保存済みPDF一覧
                <span id="pdfCount"></span>
                <button class="btn btn-gray" onclick="loadFiles()" style="font-size:12px; padding:4px 12px; margin-left:auto;">🔄 更新</button>
            </div>

            <div class="sort-bar">
                並び替え：
                <button class="sort-btn active" id="sortDateBtn" onclick="sortFiles('date')">📅 新しい順</button>
                <button class="sort-btn"        id="sortDateAscBtn" onclick="sortFiles('dateAsc')">📅 古い順</button>
                <button class="sort-btn"        id="sortNameBtn" onclick="sortFiles('name')">🔤 ファイル名順</button>
            </div>

            <div id="pdfList">
                <div style="text-align:center; color:#aaa; padding:24px;">読み込み中...</div>
            </div>
        </div>

    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzUEkckXl7NafZtsM0bgmYH2NwasulTItwGdy5YoDb_DFlQHc4Mqb4yna7onnzeIAR5/exec';

        let adminToken = null;

        // ==============================
        // 管理者ログイン
        // ==============================
        async function handleAdminLogin() {
            const btn    = document.getElementById('adminLoginBtn');
            const userId = document.getElementById('adminId').value.trim();
            const pass   = document.getElementById('adminPass').value;

            if (!userId || !pass) {
                showMsg('loginMsg', 'IDとパスワードを入力してください', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = '確認中...';

            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    redirect: 'follow',
                    body: JSON.stringify({ action: 'adminLogin', userId, password: pass }),
                });
                const data = await res.json();

                if (data.success) {
                    adminToken = data.token;
                    sessionStorage.setItem('adminToken', adminToken);
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('adminSection').style.display  = 'block';
                    loadUsers();
                    loadFiles();
                } else {
                    showMsg('loginMsg', data.error || 'ログインに失敗しました', 'error');
                }
            } catch (e) {
                showMsg('loginMsg', '通信エラーが発生しました', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'ログイン';
            }
        }

        // ==============================
        // ユーザー一覧の読み込み
        // ==============================
        async function loadUsers() {
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#aaa; padding:20px;">読み込み中...</td></tr>';

            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    redirect: 'follow',
                    body: JSON.stringify({ action: 'listUsers', sessionToken: adminToken }),
                });
                const data = await res.json();

                if (!data.success) {
                    tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#e53935;">${data.error}</td></tr>`;
                    return;
                }

                if (data.users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#aaa; padding:20px;">登録ユーザーはいません</td></tr>';
                    return;
                }

                tbody.innerHTML = data.users.map(u => `
                    <tr>
                        <td><strong>${u.userId}</strong></td>
                        <td>${u.createdAt}</td>
                        <td><span class="badge-active">有効</span></td>
                        <td>
                            <button class="btn btn-danger" onclick="deleteUser('${u.userId}')" style="font-size:12px; padding:4px 12px;">
                                削除
                            </button>
                        </td>
                    </tr>
                `).join('');

            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#e53935;">通信エラー</td></tr>';
            }
        }

        // ==============================
        // ユーザー追加
        // ==============================
        async function createUser() {
            const userId = document.getElementById('newUserId').value.trim();
            const pass   = document.getElementById('newUserPass').value.trim();

            if (!userId || !pass) {
                showMsg('createMsg', 'IDとパスワードを入力してください', 'error');
                return;
            }

            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    redirect: 'follow',
                    body: JSON.stringify({ action: 'createUser', sessionToken: adminToken, userId, password: pass }),
                });
                const data = await res.json();

                if (data.success) {
                    showMsg('createMsg', `✅ ユーザー「${userId}」を追加しました`, 'success');
                    document.getElementById('newUserId').value  = '';
                    document.getElementById('newUserPass').value = '';
                    loadUsers();
                } else {
                    showMsg('createMsg', data.error, 'error');
                }
            } catch (e) {
                showMsg('createMsg', '通信エラーが発生しました', 'error');
            }
        }

        // ==============================
        // ユーザー削除
        // ==============================
        async function deleteUser(userId) {
            if (!confirm(`「${userId}」を削除しますか？`)) return;

            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    redirect: 'follow',
                    body: JSON.stringify({ action: 'deleteUser', sessionToken: adminToken, userId }),
                });
                const data = await res.json();

                if (data.success) {
                    showMsg('deleteMsg', `✅ 「${userId}」を削除しました`, 'success');
                    loadUsers();
                } else {
                    showMsg('deleteMsg', data.error, 'error');
                }
            } catch (e) {
                showMsg('deleteMsg', '通信エラーが発生しました', 'error');
            }
        }

        // ==============================
        // パスワード自動生成
        // ==============================
        function generatePassword() {
            const chars = 'abcdefghijkmnpqrstuvwxyzABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let pass = '';
            for (let i = 0; i < 10; i++) {
                pass += chars[Math.floor(Math.random() * chars.length)];
            }
            document.getElementById('newUserPass').value = pass;
        }

        // ==============================
        // 管理者ログアウト
        // ==============================
        async function adminLogout() {
            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    redirect: 'follow',
                    body: JSON.stringify({ action: 'logout', sessionToken: adminToken }),
                });
            } catch (e) {}

            adminToken = null;
            sessionStorage.removeItem('adminToken');
            document.getElementById('adminSection').style.display  = 'none';
            document.getElementById('loginSection').style.display  = 'block';
            document.getElementById('adminId').value  = '';
            document.getElementById('adminPass').value = '';
        }

        // ==============================
        // メッセージ表示
        // ==============================
        function showMsg(id, text, type) {
            const el = document.getElementById(id);
            el.textContent = text;
            el.className = `msg show ${type}`;
            setTimeout(() => el.classList.remove('show'), 4000);
        }

        // Enterキーでログイン
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter' && document.getElementById('loginSection').style.display !== 'none') {
                handleAdminLogin();
            }
        });

        // セッション復元（管理者がリロードしたとき）
        window.onload = () => {
            const savedToken = sessionStorage.getItem('adminToken');
            if (savedToken) {
                adminToken = savedToken;
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('adminSection').style.display  = 'block';
                loadUsers();
                loadFiles();
            }
        };

        // ==============================
        // PDF一覧の読み込み・表示
        // ==============================
        let allFiles    = [];
        let currentSort = 'date'; // 'date' | 'dateAsc' | 'name'

        async function loadFiles() {
            const list = document.getElementById('pdfList');
            if (!list) return;
            list.innerHTML = '<div style="text-align:center; color:#aaa; padding:24px;">読み込み中...</div>';
            document.getElementById('pdfCount').textContent = '';

            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    redirect: 'follow',
                    body: JSON.stringify({ action: 'listFiles', sessionToken: adminToken }),
                });
                const data = await res.json();

                if (!data.success) {
                    list.innerHTML = `<div style="text-align:center; color:#e53935; padding:24px;">⚠️ ${data.error || 'エラーが発生しました'}</div>`;
                    return;
                }

                allFiles = data.files || [];
                document.getElementById('pdfCount').textContent = `（${allFiles.length} 件）`;
                renderFiles();

            } catch (e) {
                list.innerHTML = '<div style="text-align:center; color:#e53935; padding:24px;">⚠️ 通信エラーが発生しました</div>';
            }
        }

        function sortFiles(key) {
            currentSort = key;
            // ボタンのactive切替
            ['sortDateBtn','sortDateAscBtn','sortNameBtn'].forEach(id => {
                document.getElementById(id).classList.remove('active');
            });
            document.getElementById(key === 'date' ? 'sortDateBtn' : key === 'dateAsc' ? 'sortDateAscBtn' : 'sortNameBtn').classList.add('active');
            renderFiles();
        }

        function renderFiles() {
            const list = document.getElementById('pdfList');
            if (!list) return;

            if (allFiles.length === 0) {
                list.innerHTML = '<div style="text-align:center; color:#aaa; padding:24px;">保存済みPDFはありません</div>';
                return;
            }

            const sorted = [...allFiles].sort((a, b) => {
                if (currentSort === 'date')    return b.createdDate.localeCompare(a.createdDate);
                if (currentSort === 'dateAsc') return a.createdDate.localeCompare(b.createdDate);
                return a.name.localeCompare(b.name, 'ja');
            });

            list.innerHTML = sorted.map(f => {
                const safeName     = f.name.replace(/</g,'&lt;').replace(/>/g,'&gt;');
                const safeDate     = f.createdDate.replace(/</g,'&lt;').replace(/>/g,'&gt;');
                const safeUrl      = f.url.replace(/"/g,'&quot;');
                const safeId       = (f.id || '').replace(/"/g,'&quot;');
                const downloadUrl  = `https://drive.google.com/uc?export=download&id=${safeId}`;
                const userBadge    = f.userId
                    ? `<span class="user-badge">👤 ${f.userId.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>`
                    : '';
                return `
                <div class="pdf-item">
                    <div class="pdf-icon">📄</div>
                    <div class="pdf-info">
                        <div>
                            <a class="pdf-name" href="${safeUrl}" target="_blank" rel="noopener noreferrer">${safeName}</a>
                            ${userBadge}
                        </div>
                        <div class="pdf-date">🕐 ${safeDate}</div>
                    </div>
                    <div class="pdf-actions">
                        <button class="btn-open" onclick="window.open('${safeUrl}','_blank')">開く</button>
                        <a class="btn-download" href="${downloadUrl}" download="${safeName}">⬇ ダウンロード</a>
                    </div>
                </div>`;
            }).join('');
        }
    </script>
</body>
</html>
